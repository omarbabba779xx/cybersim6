<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(80, 55)" filter="url(#glow)">
    <path d="M45 0 L90 20 L90 55 C90 80 68 98 45 105 C22 98 0 80 0 55 L0 20 Z"
          fill="none" stroke="url(#blueGlow)" stroke-width="2.5"/>
    <path d="M45 15 L75 30 L75 52 C75 72 58 85 45 90 C32 85 15 72 15 52 L15 30 Z"
          fill="#58a6ff" opacity="0.1"/>
    <!-- Lock icon inside shield -->
    <rect x="32" y="45" width="26" height="20" rx="3" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <path d="M38 45 V38 C38 31 52 31 52 38 V45" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="45" cy="55" r="3" fill="#58a6ff"/>
    <line x1="45" y1="58" x2="45" y2="62" stroke="#58a6ff" stroke-width="2"/>
  </g>

  <!-- Title: Cyber -->
  <text x="200" y="95" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="56" font-weight="800" fill="url(#blueGlow)" filter="url(#glow)"
        letter-spacing="-1">Cyber</text>

  <!-- Title: Sim6 -->
  <text x="407" y="95" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="56" font-weight="800" fill="url(#redGlow)" filter="url(#glow)"
        letter-spacing="-1">Sim6</text>

  <!-- Subtitle -->
  <text x="200" y="125" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="16" fill="#8b949e" letter-spacing="3"
        font-weight="400">CYBERSECURITY SIMULATION PLATFORM</text>

  <!-- Tags -->
  <g transform="translate(200, 145)">
    <rect x="0" y="0" width="55" height="22" rx="4" fill="#f8514922" stroke="#f85149" stroke-width="0.5"/>
    <text x="27" y="15" font-family="monospace" font-size="10" fill="#f85149" text-anchor="middle" font-weight="600">DDoS</text>

    <rect x="65" y="0" width="45" height="22" rx="4" fill="#d2980022" stroke="#d29800" stroke-width="0.5"/>
    <text x="87" y="15" font-family="monospace" font-size="10" fill="#d29800" text-anchor="middle" font-weight="600">SQLi</text>

    <rect x="120" y="0" width="80" height="22" rx="4" fill="#58a6ff22" stroke="#58a6ff" stroke-width="0.5"/>
    <text x="160" y="15" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle" font-weight="600">BruteForce</text>

    <rect x="210" y="0" width="42" height="22" rx="4" fill="#d2a8ff22" stroke="#d2a8ff" stroke-width="0.5"/>
    <text x="231" y="15" font-family="monospace" font-size="10" fill="#d2a8ff" text-anchor="middle" font-weight="600">XSS</text>

    <rect x="262" y="0" width="68" height="22" rx="4" fill="#3fb95022" stroke="#3fb950" stroke-width="0.5"/>
    <text x="296" y="15" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">Phishing</text>

    <rect x="340" y="0" width="85" height="22" rx="4" fill="#f0883e22" stroke="#f0883e" stroke-width="0.5"/>
    <text x="382" y="15" font-family="monospace" font-size="10" fill="#f0883e" text-anchor="middle" font-weight="600">Ransomware</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="700" cy="40" r="2" fill="#f85149" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="55" r="1.5" fill="#58a6ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="35" r="1" fill="#3fb950" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="710" cy="70" r="1.5" fill="#d29800" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- EMSI badge -->
  <rect x="640" y="140" width="130" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="705" y="159" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e"
        text-anchor="middle" font-weight="500">EMSI Tanger 4IIR</text>

  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="198" rx="15" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>
