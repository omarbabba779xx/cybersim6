general:
  log_dir: "./logs"
  sandbox_dir: "./sandbox/test_files"

ddos:
  syn_flood:
    target: "127.0.0.1"
    target_port: 8080
    packet_count: 1000
    rate_limit: 100
  http_flood:
    target_url: "http://127.0.0.1:8080"
    request_count: 500
    threads: 4
  detection:
    threshold_pps: 50
    window_seconds: 5

bruteforce:
  target_url: "http://127.0.0.1:9090/login"
  wordlist: "./cybersim/bruteforce/wordlists/common.txt"
  username: "admin"
  max_attempts: 1000
  delay_ms: 50
  detection:
    max_failures: 5
    window_seconds: 60

sqli:
  target_url: "http://127.0.0.1:8081"
  server_port: 8081
  detection:
    patterns_enabled: true
    log_payloads: true

xss:
  target_url: "http://127.0.0.1:8082"
  server_port: 8082
  detection:
    patterns_enabled: true
    log_payloads: true

phishing:
  server_port: 8083
  default_template: "corporate_login"
  detection:
    risk_threshold: 0.6

ransomware:
  sandbox_dir: "./sandbox/test_files"
  file_extensions:
    - ".txt"
    - ".csv"
    - ".doc"
    - ".pdf"
  encrypted_extension: ".locked"
  max_files: 50
  max_file_size_mb: 10
  keep_originals: true
  detection:
    entropy_threshold: 7.0
    scan_interval: 5

# Anomaly detection parameters
anomaly:
  window_size: 100
  z_threshold: 2.5
  learning_period: 20

# Incident Response SLA (minutes)
incident_response:
  sla_critical: 15
  sla_high: 30
  sla_medium: 60
  sla_low: 240
